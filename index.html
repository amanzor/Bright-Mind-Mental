<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bright Mind Mental Health</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #0d1a2b;
            overflow: hidden;
        }

        .transition-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d1a2b;
            z-index: 9999;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        @media (max-width: 768px) {
            video {
                object-fit: contain;
                background: #0d1a2b;
            }
        }

        .fade-out {
            animation: fadeOut 0.8s ease-out forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="transition-container" id="transitionContainer">
        <video id="transitionVideo" autoplay muted playsinline preload="auto" crossorigin="anonymous">
            <source src="logo_animationmp_.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <script>
        const video = document.getElementById('transitionVideo');
        const container = document.getElementById('transitionContainer');
        const startTime = 5; // Start at 5 seconds
        const endTime = 10;  // End at 10 seconds
        let isPlaying = false;
        let hasRedirected = false;

        function redirectToMain() {
            if (hasRedirected) return;
            hasRedirected = true;
            container.classList.add('fade-out');
            setTimeout(function() {
                window.location.href = 'main.html';
            }, 800);
        }

        // Wait for video to be loaded, then seek to start position
        video.addEventListener('loadedmetadata', function() {
            console.log('Video loaded. Duration:', video.duration);
            video.currentTime = startTime;
            isPlaying = true;
        }, { once: true });

        // Handle autoplay
        video.addEventListener('play', function() {
            console.log('Video started playing');
        });

        // Monitor video playback and stop at end time
        video.addEventListener('timeupdate', function() {
            if (isPlaying && video.currentTime >= endTime) {
                video.pause();
                console.log('Video ended at', video.currentTime);
                isPlaying = false;
                redirectToMain();
            }
        });

        // Error handling
        video.addEventListener('error', function() {
            console.error('Video load error:', video.error);
            redirectToMain();
        });

        video.addEventListener('stalled', function() {
            console.warn('Video stalled');
            redirectToMain();
        });

        // Fallback: if video hasn't started after 2 seconds, redirect
        setTimeout(function() {
            if (video.paused && video.currentTime < startTime) {
                console.warn('Video did not start, redirecting');
                redirectToMain();
            }
        }, 2000);

        // Safety timeout: if still on transition page after 15 seconds, redirect
        setTimeout(function() {
            if (!hasRedirected) {
                console.warn('Safety timeout reached, redirecting');
                redirectToMain();
            }
        }, 15000);
    </script>
</body>
</html>
