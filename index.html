<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bright Mind Mental Health</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #0d1a2b;
            overflow: hidden;
        }

        .transition-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d1a2b;
            z-index: 9999;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .fade-out {
            animation: fadeOut 0.8s ease-out forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="transition-container" id="transitionContainer">
        <video id="transitionVideo" muted playsinline>
            <source src="logo_animationmp_.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        const video = document.getElementById('transitionVideo');
        const container = document.getElementById('transitionContainer');
        const startTime = 5; // Start at 5 seconds (0.05 in the 100 second scale)
        const endTime = 10;  // End at 10 seconds (0.1 in the 100 second scale)
        const clipDuration = endTime - startTime; // 5 seconds

        // Wait for video to be loaded, then seek to start position
        video.addEventListener('loadedmetadata', function() {
            video.currentTime = startTime;
            video.play();
        });

        // Monitor video playback and stop at end time
        video.addEventListener('timeupdate', function() {
            if (video.currentTime >= endTime) {
                video.pause();
                // Fade out and redirect
                container.classList.add('fade-out');
                setTimeout(function() {
                    window.location.href = 'main.html';
                }, 800);
            }
        });

        // Fallback: if video somehow doesn't play, go to main site after timeout
        setTimeout(function() {
            if (video.paused && video.currentTime < startTime) {
                // Video didn't start, redirect
                window.location.href = 'main.html';
            }
        }, 500);
    </script>
</body>
</html>
